<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sales Diagnostic System</title>
<!-- fonts loaded from system -->
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#0d1b2a;--navy-card:#1a2d42;--navy-surface:#152336;
  --gold:#c9a84c;--gold-light:#e8c97a;--gold-pale:rgba(201,168,76,0.12);--gold-border:rgba(201,168,76,0.3);
  --text-primary:#f0ece4;--text-secondary:rgba(240,236,228,0.6);--text-muted:rgba(240,236,228,0.32);
  --card-border:rgba(255,255,255,0.07);--radius:14px;--radius-sm:10px;--radius-pill:50px;
  --alert-bg:rgba(220,70,60,0.13);--alert-border:rgba(220,70,60,0.42);--alert-text:#f4a497;
  --green-bg:rgba(60,180,100,0.12);--green-border:rgba(60,180,100,0.38);--green-text:#86e0a8;
  --blue-bg:rgba(100,160,240,0.12);--blue-border:rgba(100,160,240,0.45);--blue-text:rgba(160,200,255,0.95);
  --silver:#a8b8c8;
}
html,body{height:100%;background:var(--navy);color:var(--text-primary);font-family:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;overflow:hidden;}
#app{height:100%;display:flex;flex-direction:column;}
.screen{height:100%;display:flex;flex-direction:column;background:var(--navy);}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.top-bar{background:var(--navy-surface);border-bottom:1px solid var(--card-border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rep-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);display:inline-block;margin-right:7px;}
.rep-label{font-size:13px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);}
.step-label{font-size:13px;color:var(--text-muted);font-weight:300;}
.three-dot-btn{display:flex;gap:5px;align-items:center;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;background:transparent;}
.dot-sh{width:6px;height:6px;border-radius:50%;background:var(--text-muted);}
.owner-strip-wrap{background:var(--navy-card);border-bottom:1px solid var(--card-border);flex-shrink:0;}
.owner-strip-main{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.owner-name{font-family:Georgia, 'Times New Roman', serif;font-size:26px;font-weight:500;color:var(--text-primary);letter-spacing:.02em;}
.owner-num{font-size:13px;color:var(--text-muted);font-weight:300;margin-top:2px;}
.owner-right{display:flex;align-items:center;gap:16px;}
.vip-block{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.vip-prefix{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;}
.vip-name-disp{font-family:Georgia, 'Times New Roman', serif;font-size:24px;font-weight:600;letter-spacing:.04em;line-height:1.1;}
.eb-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.eb-star-frame{position:relative;width:54px;height:54px;display:flex;align-items:center;justify-content:center;}
.eb-star-frame svg{position:absolute;inset:0;width:54px;height:54px;}
.eb-name-row{display:flex;gap:3px;}
.eb-t{font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;}
.eb-cap{font-size:8px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);}
.other-products-row{padding:6px 20px 10px;display:flex;gap:5px;flex-wrap:wrap;border-top:1px solid var(--card-border);align-items:center;}
.op-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;font-weight:500;margin-right:4px;}
.ctag{font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;padding:4px 10px;border-radius:var(--radius-pill);border:1px solid;white-space:nowrap;transition:all .25s;background:rgba(255,255,255,0.02);border-color:rgba(255,255,255,0.07);color:var(--text-muted);cursor:pointer;}
.ctag.green.lit{background:var(--green-bg);border-color:var(--green-border);color:var(--green-text);}
.ctag.blue.lit{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue-text);}
.ctag.gold.lit{background:var(--gold-pale);border-color:var(--gold-border);color:var(--gold-light);}
.section-label{font-size:14px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding-left:2px;margin-bottom:8px;}
.chip{background:var(--navy-card);border:1px solid var(--card-border);border-radius:var(--radius-pill);padding:13px 20px;font-size:17px;font-weight:400;color:var(--text-secondary);cursor:pointer;transition:all .18s;user-select:none;white-space:nowrap;display:inline-block;}
.chip.sel{background:var(--gold-pale);border-color:var(--gold-border);color:var(--gold-light);font-weight:500;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.visit-chip{background:var(--navy-card);border:1px solid var(--card-border);border-radius:var(--radius);padding:13px 18px;cursor:pointer;transition:all .18s;user-select:none;display:flex;flex-direction:column;gap:3px;min-width:100px;align-items:center;}
.visit-chip.sel{background:var(--gold-pale);border-color:var(--gold-border);}
.vc-main{font-size:15px;font-weight:500;color:var(--text-primary);}
.visit-chip.sel .vc-main{color:var(--gold-light);}
.vc-sub{font-size:12px;color:var(--text-muted);}
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;}
.vip-tile{background:var(--navy-card);border:1px solid var(--card-border);border-radius:var(--radius);padding:13px 14px;cursor:pointer;transition:all .18s;display:flex;align-items:flex-start;justify-content:space-between;gap:5px;user-select:none;}
.vip-tile.sel{background:var(--gold-pale);border-color:var(--gold-border);}
.vip-tile.sel-eb{background:rgba(201,168,76,0.2);border-color:var(--gold);}
.tile-name{font-size:16px;font-weight:500;color:var(--text-primary);line-height:1.4;}
.vip-tile.sel .tile-name,.vip-tile.sel-eb .tile-name{color:var(--gold-light);}
.tile-check{width:16px;height:16px;border-radius:50%;border:1px solid var(--card-border);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:transparent;}
.vip-tile.sel .tile-check,.vip-tile.sel-eb .tile-check{background:var(--gold);border-color:var(--gold);}
.divider{height:1px;background:var(--card-border);width:100%;margin:4px 0;}
.footer-bar{background:var(--navy-surface);border-top:1px solid var(--card-border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-shrink:0;}
.btn-primary{background:var(--gold);border:none;border-radius:var(--radius-sm);color:var(--navy);font-family:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;font-size:17px;font-weight:500;padding:16px 32px;cursor:pointer;letter-spacing:.03em;}
.btn-primary:disabled{opacity:.3;cursor:default;}
.btn-secondary{background:transparent;border:1px solid var(--card-border);border-radius:var(--radius-sm);color:var(--text-secondary);font-family:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;font-size:15px;padding:16px 20px;cursor:pointer;}
.readiness-txt{font-size:14px;color:var(--text-muted);font-weight:300;}
.readiness-txt b{color:var(--gold);font-weight:500;}
.credit-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.credit-lbl{font-size:12px;color:var(--text-muted);font-weight:300;min-width:135px;}
.credit-inp{font-size:14px;color:var(--text-secondary);background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.08);outline:none;width:80px;padding-bottom:1px;font-family:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;text-align:right;}
.owner-inp{font-family:Georgia, 'Times New Roman', serif;font-size:28px;font-weight:500;color:var(--text-primary);background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.1);outline:none;width:100%;padding-bottom:3px;letter-spacing:.02em;}
.owner-inp::placeholder{color:var(--text-muted);font-style:italic;}
.num-inp{font-size:14px;color:var(--text-secondary);background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.08);outline:none;width:130px;padding-bottom:1px;font-family:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;}
.num-inp::placeholder{color:rgba(240,236,228,0.18);}
.fee-inp::-webkit-inner-spin-button,.fee-inp::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.fee-inp[type=number]{-moz-appearance:textfield;}
.fee-inp{font-size:34px;font-weight:500;color:var(--gold);background:transparent;border:none;border-bottom:2px solid rgba(201,168,76,0.25);outline:none;width:100px;text-align:right;padding-bottom:2px;font-family:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;line-height:1;}
.fee-inp::placeholder{color:rgba(201,168,76,0.25);}
.date-inp{background:var(--navy-card);border:1px solid var(--card-border);border-radius:var(--radius-pill);padding:10px 16px;font-family:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;font-size:14px;color:var(--text-secondary);outline:none;width:135px;}
.date-inp::placeholder{color:var(--text-muted);}
.vip-disp-block{display:flex;flex-direction:column;align-items:flex-end;gap:1px;min-height:44px;justify-content:center;}
.vip-disp-prefix{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;}
.vip-disp-name{font-family:Georgia, 'Times New Roman', serif;font-size:24px;font-weight:600;letter-spacing:.04em;line-height:1.1;}
.warn-row{display:flex;align-items:center;gap:6px;margin-top:4px;}
.warn-tag{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;padding:4px 12px;border-radius:var(--radius-pill);background:var(--alert-bg);border:1px solid var(--alert-border);color:var(--alert-text);}
.warn-note{font-size:11px;color:var(--alert-text);opacity:.7;font-weight:300;font-style:italic;}
.p-section{padding:18px 20px;display:flex;flex-direction:column;gap:14px;}
.progress-dots{display:flex;gap:5px;align-items:center;}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);transition:all .3s;display:inline-block;}
.pdot.done{background:var(--gold);}
.pdot.active{background:var(--gold-light);width:20px;border-radius:3px;}
.q-number{font-size:13px;font-weight:500;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.q-text{font-family:Georgia, 'Times New Roman', serif;font-size:28px;font-weight:500;line-height:1.3;color:var(--text-primary);margin-bottom:10px;}
.instr-bar{background:rgba(201,168,76,0.07);border:1px solid var(--gold-border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;font-size:14px;color:var(--gold-light);font-weight:300;text-align:center;}
.instr-bar.rdy{background:rgba(201,168,76,0.12);color:var(--gold);}
.answer-card{background:var(--navy-card);border:1px solid var(--card-border);border-radius:var(--radius);padding:17px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:68px;user-select:none;margin-bottom:10px;position:relative;overflow:hidden;width:100%;max-width:600px;box-sizing:border-box;}
.answer-card.sel-p{border-color:rgba(201,168,76,0.7);background:#1f3452;}
.answer-card.sel-s{border-color:rgba(201,168,76,0.35);background:#1f3452;}
.card-text{font-size:18px;font-weight:400;color:var(--text-primary);flex:1;line-height:1.4;}
.card-badge{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:20px;white-space:nowrap;display:none;}
.sel-p .badge-p{display:inline-block;background:var(--gold);color:var(--navy);}
.sel-s .badge-s{display:inline-block;background:rgba(201,168,76,0.2);color:var(--gold-light);border:1px solid var(--gold-border);}
.open-ta{background:var(--navy-card);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;font-family:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;font-size:15px;color:var(--text-primary);resize:none;outline:none;width:100%;height:110px;line-height:1.6;}
.open-ta:focus{border-color:var(--gold-border);}
.open-ta::placeholder{color:var(--text-muted);}
.open-nudge{font-size:13px;color:var(--text-muted);text-align:center;margin-top:8px;}
.open-nudge.rdy{color:var(--gold);}
.tap-card{background:var(--navy-card);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px 16px;cursor:pointer;transition:all .18s;user-select:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;min-height:86px;text-align:center;}
.tap-card.sel{background:var(--gold-pale);border-color:var(--gold-border);}
.tap-label{font-size:17px;font-weight:500;color:var(--text-primary);}
.tap-card.sel .tap-label{color:var(--gold-light);}
.tap-sub{font-size:14px;color:var(--text-muted);font-weight:300;}
.tap-card.sel .tap-sub{color:var(--gold);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.guard-card{background:var(--navy-card);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px 20px;cursor:pointer;transition:all .2s;user-select:none;display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.guard-card.on{background:var(--alert-bg);border-color:var(--alert-border);}
.g-title{font-size:16px;font-weight:500;color:var(--text-primary);}
.guard-card.on .g-title{color:var(--alert-text);}
.g-sub{font-size:13px;color:var(--text-muted);font-weight:300;}
.toggle-pill{width:44px;height:26px;border-radius:13px;background:rgba(255,255,255,0.08);border:1px solid var(--card-border);position:relative;transition:all .2s;flex-shrink:0;}
.toggle-pill.on{background:var(--alert-border);}
.toggle-thumb{width:20px;height:20px;border-radius:50%;background:var(--text-muted);position:absolute;top:2px;left:2px;transition:all .2s;}
.toggle-pill.on .toggle-thumb{left:20px;background:var(--alert-text);}
.tab-bar{background:var(--navy-surface);border-bottom:1px solid var(--card-border);display:flex;padding:0 12px;overflow-x:auto;flex-shrink:0;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:15px 16px;font-size:15px;font-weight:400;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;flex-shrink:0;user-select:none;}
.tab.active{color:var(--text-primary);border-bottom-color:var(--gold);}
.tab.alert-tab{color:var(--alert-text);}
.tab.alert-tab.active{border-bottom-color:var(--alert-text);}
.tab.pgm-tab{color:var(--gold);}
.tab.pgm-tab.active{color:var(--gold-light);border-bottom-color:var(--gold);}
.alert-pip{width:7px;height:7px;border-radius:50%;background:var(--alert-text);display:inline-block;margin-left:4px;vertical-align:middle;animation:pip 1.8s ease-in-out infinite;}
@keyframes pip{0%,100%{opacity:1;}50%{opacity:.25;}}
.tab-body{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.tab-body.active{display:block;}
.card{background:var(--navy-card);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;}
.card+.card{margin-top:12px;}
.hero-card{background:var(--navy-card);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;text-align:center;}
.hero-title{font-family:Georgia, 'Times New Roman', serif;font-size:26px;font-weight:500;color:var(--text-primary);line-height:1.2;margin-bottom:10px;}
.hero-div{width:36px;height:1px;background:var(--gold-border);margin:0 auto 10px;}
.hero-sub{font-size:14px;color:var(--text-secondary);font-weight:300;line-height:1.6;max-width:320px;margin:0 auto;}
.d2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.dc{background:var(--navy-card);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:14px;}
.dc-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.dc-val{font-size:15px;font-weight:500;color:var(--text-primary);}
.dc-sub{font-size:12px;color:var(--text-secondary);font-weight:300;margin-top:2px;}
.flag-banner{background:var(--alert-bg);border:1px solid var(--alert-border);border-radius:var(--radius);padding:16px;margin-top:12px;}
.flag-banner-title{font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--alert-text);margin-bottom:10px;}
.flag-item{padding:9px 11px;background:rgba(220,70,60,0.08);border-radius:var(--radius-sm);border-left:3px solid var(--alert-border);margin-bottom:8px;}
.flag-item:last-child{margin-bottom:0;}
.flag-signal{font-size:11px;color:var(--alert-text);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;}
.flag-text{font-size:13px;color:var(--alert-text);opacity:.8;font-weight:300;line-height:1.4;}
.ns-lbl{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);padding-left:2px;margin-bottom:8px;}
.disc-card{border-radius:var(--radius);padding:16px;border:1px solid;cursor:pointer;margin-bottom:9px;}
.disc-card.neutral{background:var(--navy-card);border-color:var(--card-border);}
.disc-card.pending{background:var(--alert-bg);border-color:var(--alert-border);}
.disc-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.disc-title-txt{font-size:14px;font-weight:500;}
.disc-badge{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;padding:3px 10px;border-radius:var(--radius-pill);border:1px solid;white-space:nowrap;flex-shrink:0;}
.disc-badge.red{background:var(--alert-bg);border-color:var(--alert-border);color:var(--alert-text);}
.disc-badge.muted{background:rgba(255,255,255,0.04);border-color:var(--card-border);color:var(--text-muted);}
.disc-body-txt{font-size:13px;font-weight:300;line-height:1.5;}
.disc-hint-txt{font-size:11px;color:var(--text-muted);margin-top:5px;font-style:italic;}
.elig-card{background:var(--navy-card);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;margin-bottom:9px;}
.elig-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
.elig-title-txt{font-size:14px;font-weight:500;color:var(--text-primary);}
.elig-badge{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;padding:3px 10px;border-radius:var(--radius-pill);}
.elig-badge.open{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green-text);}
.elig-badge.closed{background:var(--alert-bg);border:1px solid var(--alert-border);color:var(--alert-text);}
.elig-body-txt{font-size:13px;color:var(--text-secondary);font-weight:300;line-height:1.5;}
.elig-date-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px;}
.elig-date-lbl{font-size:12px;color:var(--text-muted);font-weight:300;white-space:nowrap;}
.elig-date-inp{background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.15);outline:none;font-family:-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;font-size:13px;color:#f0c97a;width:85px;padding-bottom:1px;}
.closed-card{background:var(--alert-bg);border:1px solid var(--alert-border);border-radius:var(--radius);padding:16px;margin-bottom:9px;}
.mgr-prompt{background:rgba(20,40,70,0.95);border:2px solid var(--blue-border);border-radius:var(--radius);padding:18px;margin-top:10px;}
.mgr-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.mgr-icon{width:32px;height:32px;border-radius:50%;background:var(--blue-bg);border:1px solid var(--blue-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mgr-title{font-size:14px;font-weight:500;color:var(--blue-text);}
.mgr-body{font-size:13px;color:rgba(160,200,255,.75);font-weight:300;line-height:1.6;}
.mgr-ref{font-size:11px;color:rgba(160,200,255,.35);letter-spacing:.06em;text-transform:uppercase;margin-top:6px;}
.pref-card{background:var(--navy-card);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;}
.pref-sec-lbl{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--card-border);padding-bottom:5px;margin-bottom:10px;margin-top:14px;}
.pref-sec-lbl:first-child{margin-top:0;}
.pref-q-txt{font-size:15px;color:var(--text-muted);font-weight:300;margin-bottom:5px;}
.pref-a-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}

function scorePerson(answers, personKey, disc) {
  // personKey: 'primary' or 'secondary'
  var sc = {Lion:0, Otter:0, Retriever:0, Owl:0};
  var ms = {Maximize:0, NoHassle:0};
  var q4txt = ''; var owlQ = false;
  QUESTIONS.forEach(function(q, qi) {
    var a = answers[qi];
    if (!a) return;
    if (q.type === 'open') { q4txt = a.open || ''; return; }
    if (q.type === 'context') { return; } // Q12-14: context only, not scored
    var chosen = a[personKey]; // primary or secondary selection index
    if (chosen !== null && q.answers[chosen]) {
      sc[q.answers[chosen].p] += 2;
      ms[q.answers[chosen].m] += 2;
    }
    // If only one person (no secondary field used), also score secondary for primary person
    if (personKey === 'primary' && a.secondary !== null && !S.twoPersonMode) {
      if (q.answers[a.secondary]) {
        sc[q.answers[a.secondary].p] += 1;
        ms[q.answers[a.secondary].m] += 1;
      }
    }
    if (qi === 8 && chosen === 3) owlQ = true; // Q9 delay signal
  });
  var sorted = Object.keys(sc).sort(function(a,b){return sc[b]-sc[a];});
  var top = sorted[0]; var second = sorted[1];
  var isHybrid = sc[top] - sc[second] <= 2 && sc[second] > 0;
  var totalMs = ms.Maximize + ms.NoHassle;
  var mindset = 'Balanced';
  if (totalMs > 0) { var r = ms.Maximize/totalMs; if(r>0.6) mindset='Maximize'; else if(r<0.4) mindset='No-Hassle'; }
  var noPattern = sc[top] <= 3;
  var q4friction = q4txt.length > 0 && /frustrat|disappoint|difficult|hard|problem|issue|bad|terrible|worst|annoying|never|doesn't work/i.test(q4txt);
  var guarded = disc && disc.guarded;
  var jt = 0;
  if (guarded) jt++; if (q4friction) jt++; if (noPattern) jt++; if (owlQ) jt++;
  var jackal = jt >= 2;
  var intConf = disc && disc.usage==='internal'?'High':disc&&disc.usage==='mixed'?'Medium':'Low';
  var extConf = disc && disc.usage==='external'?'High':disc&&disc.usage==='mixed'?'Medium':'Low';

    Lion:{pure:'The Decider',withOtter:'Driver & Connector',withRetriever:'Driven Loyalist',withOwl:'Strategic Commander'},

    Owl:{pure:'The Analyst',withLion:'Strategic Commander',withOtter:'Curious Analyst',withRetriever:'Careful Planner'}
  };
  var desc = isHybrid ? (DESC[top]['with'+second] || top+' / '+second) : DESC[top].pure;
  var SHAPES = {
    Lion:{color:'rgba(201,168,76,0.15)',type:'tri'},
    Otter:{color:'rgba(232,201,122,0.13)',type:'circ'},
    Retriever:{color:'rgba(134,224,168,0.1)',type:'rect'},
    Owl:{color:'rgba(136,200,232,0.12)',type:'hex'}
  };
  var PB = {
    Lion:{communicate:['Lead with outcomes, not process','Be direct and confident','Match their energy, then slow deliberately'],trust:['Show them the best option clearly','Acknowledge their decisiveness','Let them feel in control'],movement:['Present an exclusive opportunity','Show what they are currently missing'],avoid:['Over-explaining','Wasting their time with small talk']},
    Otter:{communicate:['Make it feel personal and exciting','Use stories and examples','Show enthusiasm'],trust:['Make them feel special and valued','Share experiences from others like them','Keep energy positive'],movement:['Create excitement around the opportunity','Appeal to their lifestyle vision'],avoid:['Getting too technical','Being overly formal or stiff']},
    Retriever:{communicate:['Be warm and reassuring','Move at a comfortable pace','Emphasize continuity and loyalty'],trust:['Honor their history with the brand','Show consistency and reliability','Avoid pressure'],movement:['Frame as a natural next step','Emphasize how smooth the process will be'],avoid:['High pressure tactics','Rushing the conversation']},
    Owl:{communicate:['Provide detail and logic','Give them time to process','Answer questions thoroughly'],trust:['Show proof and data','Be transparent about process','Respect their analytical nature'],movement:['Give them a framework for deciding','Allow time to review before committing'],avoid:['Skipping details','Pushing for a fast decision']}
  };
  var ANGLES = {
    Lion:[
      "Gap between current usage and what their level was built to deliver",
      "Position them as someone who should always have the best available",
      "Show them what others at their level are doing differently"
    ],
    Otter:[
      "Paint a vision of what their travel life could look like",
      "Connect the opportunity to their family and experiences",
      "Make them feel like they are part of something exclusive"
    ],
    Retriever:[
      "Acknowledge their loyalty and how long they have been with you",
      "Show how this is a natural evolution of what they already have",
      "Reassure them the process is simple and familiar"
    ],
    Owl:[
      "Walk through the math and long-term value clearly",
      "Address the gap between what they pay and what they get",
      "Give them a structured way to evaluate the decision"
    ]
  };
  var CURIOSITY = {
    Lion:[
      "If you could design your ideal ownership experience, what would be different?",
      "There is something most owners at your level have not heard about yet — I want to show you.",
      "What would it mean for you if this concern just went away?"
    ],
    Otter:[
      "If time and availability were not limitations, how would you be using this?",
      "There are things that have changed that most owners do not know about yet.",
      "I want to show you something that usually gets people excited."
    ],
    Retriever:[
      "You have been with us long enough to deserve the full picture — can I show you something?",
      "What would make this feel completely right for where you are in life right now?",
      "There is a path that a lot of long-term owners have taken that might make sense for you."
    ],
    Owl:[
      "What would you need to see to feel fully confident moving forward?",
      "I want to walk you through exactly how this works — most people do not know these details exist.",
      "If the numbers made sense, what else would matter to you?"
    ]
  };
  return {
    desc:desc, isHybrid:isHybrid, top:top, second:second, mindset:mindset,
    jackal:jackal, intConf:intConf, extConf:extConf,
    pb:PB[top], shapes:[SHAPES[top], isHybrid?SHAPES[second]:null],
    angles:ANGLES[top], curiosity:CURIOSITY[top], q4txt:q4txt, scores:sc
  };

function scoreSession(answers, disc) {
  var p1 = scorePerson(answers, 'primary', disc);
  var p2 = S.twoPersonMode ? scorePerson(answers, 'secondary', disc) : null;
  // Combined Jackal: if either person triggers it
  var jackal = p1.jackal || (p2 && p2.jackal);
  return { p1:p1, p2:p2, jackal:jackal, twoPersonMode:S.twoPersonMode, intConf:p1.intConf, extConf:p1.extConf };
}

function calcPGM(monthly) {
  var m = parseFloat(monthly) || 0;
  var annual = Math.round(m * 12);
  var cumulative = 0;
  var rows = [];
  for (var y = 1; y <= 20; y++) {
    if (y > 1 && y <= 3) annual = Math.round(annual * 1.05);
    else if (y > 3 && y <= 8) annual = Math.round(annual * 1.07);
    else if (y > 8) annual = Math.round(annual * 1.092);
    cumulative += annual;
    rows.push({y:y, annual:annual, cumulative:cumulative});
  }
  return rows;
}

function h(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'className') el.className = attrs[k];
    else if (k === 'style') Object.assign(el.style, attrs[k]);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === 'inputmode') el.setAttribute('inputmode', attrs[k]);
    else el.setAttribute(k, attrs[k]);
  });
  if (children) {
    if (typeof children === 'string') el.innerHTML = children;
    else if (Array.isArray(children)) children.forEach(function(c) { if(c) el.appendChild(c); });
    else el.appendChild(children);
  }
  return el;
}

function buildOverlay() {

    [{lbl:'How to communicate',items:person.pb.communicate,cls:''},{lbl:'What builds trust',items:person.pb.trust,cls:''},{lbl:'What creates movement',items:person.pb.movement,cls:''},{lbl:'What to avoid',items:person.pb.avoid,cls:'avoid'}].forEach(function(s){
